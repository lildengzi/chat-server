name: Go Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    name: Run Go tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: chat-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: chat-server/go.mod
          cache-dependency-path: chat-server/go.sum

      - name: Run tests
        run: go test ./...
