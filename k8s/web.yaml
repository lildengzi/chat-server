apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-web-nginx
  namespace: chat-server
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-web
  namespace: chat-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-web
  template:
    metadata:
      labels:
        app: chat-web
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: index
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
      volumes:
        - name: nginx-conf
          configMap:
            name: chat-web-nginx
        - name: index
          configMap:
            name: chat-web-index
---
apiVersion: v1
kind: Service
metadata:
  name: chat-web
  namespace: chat-server
spec:
  selector:
    app: chat-web
  ports:
    - name: http
      port: 80
      targetPort: 80
